name: Build Inventory System APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Extract App Name from HTML Title
        id: get_title
        run: |
          RAW_TITLE=$(grep -oP '(?<=<title>).*?(?=</title>)' index.html || echo "InventorySystem")
          CLEAN_APP_NAME=$(echo "$RAW_TITLE" | sed 's/[^a-zA-Z0-9 ]//g' | xargs)
          CLEAN_FILE_NAME=$(echo "$CLEAN_APP_NAME" | sed 's/ /_/g')

          if [ -z "$CLEAN_APP_NAME" ]; then CLEAN_APP_NAME="InventorySystem"; CLEAN_FILE_NAME="InventorySystem"; fi

          echo "APP_NAME=$CLEAN_APP_NAME" >> $GITHUB_ENV
          echo "FILE_NAME=$CLEAN_FILE_NAME" >> $GITHUB_ENV

      - name: Structure and Configure Capacitor
        run: |
          mkdir -p www
          mv index.html style.css script.js www/ || true
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

          echo "{\"appId\": \"com.ezek.InventorySystem\", \"appName\": \"$APP_NAME\", \"webDir\": \"www\"}" > capacitor.config.json

          npx cap add android
          npx cap sync android

      - name: Full Package Isolation
        run: |
          # 1. Gradle app ID
          sed -i 's/applicationId ".*"/applicationId "com.ezek.InventorySystem"/' android/app/build.gradle

          # 2. AndroidManifest package name
          sed -i 's/package=".*"/package="com.ezek.InventorySystem"/' android/app/src/main/AndroidManifest.xml

          # 3. FileProvider reference (matches whatever authority Capacitor generated, regardless of old package name)
          find android/app/src/main/ -type f -name "AndroidManifest.xml" \
            -exec sed -i -E 's/android:authorities="[^"]*\.fileprovider"/android:authorities="com.ezek.InventorySystem.fileprovider"/g' {} +

          # 4. MainActivity Java package declaration (FIXED - actually rewrites it this time)
          find android/app/src/main/ -type f -name "MainActivity.java" \
            -exec sed -i 's/^package .*;/package com.ezek.InventorySystem;/' {} +

          # 5. Move MainActivity to correct folder path matching new package
          mkdir -p android/app/src/main/java/com/ezek/InventorySystem
          find android/app/src/main/java -name "MainActivity.java" \
            ! -path "*/com/ezek/InventorySystem/*" \
            -exec cp {} android/app/src/main/java/com/ezek/InventorySystem/MainActivity.java \;

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk ./"$FILE_NAME".apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.FILE_NAME }}-apk"
          path: "./${{ env.FILE_NAME }}.apk"
